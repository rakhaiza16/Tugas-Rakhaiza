<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form OOP Inheritance</title>
<style>
  body{font-family:Segoe UI; background:#F1F5F9; padding:30px;}
  .container{max-width:900px; margin:auto;}
  .card{background:#fff; padding:24px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.08); margin-bottom:20px;}
  h1{color:#2563EB; text-align:center;}
  label{font-weight:600; font-size:14px; display:block; margin-bottom:6px; margin-top:10px;}
  input, select{width:100%; padding:10px; border:1.5px solid #CBD5E1; border-radius:10px; box-sizing:border-box;}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .btn{width:100%; padding:12px; background:#2563EB; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer; margin-top:16px;}
  .btn:hover{background:#1D4ED8;}
  .btn-danger{background:#EF4444; padding:6px 10px; font-size:12px; color:#fff; border:none; border-radius:8px; cursor:pointer;}
  table{width:100%; border-collapse:collapse; margin-top:10px;}
  th, td{padding:10px; text-align:left; border-bottom:1px solid #E2E8F0; font-size:13px;}
  th{background:#EFF6FF; color:#1E40AF;}
  .hidden{display:none;}
  @media(max-width:600px){.row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="container">
  <h1>🏛️ Sistem Data Civitas Kampus</h1>

  <div class="card">
    <h3>Input Data</h3>
    <form id="formCivitas">
      <label>Tipe Data *</label>
      <select id="tipe" name="tipe" required>
        <option value="">-- Pilih Tipe --</option>
        <option value="Mahasiswa">Mahasiswa</option>
        <option value="Dosen">Dosen</option>
        <option value="Staff">Staff</option>
      </select>

      <div class="row">
        <div><label>Nama *</label><input type="text" id="nama" name="nama" required></div>
        <div><label>Umur *</label><input type="number" id="umur" name="umur" required></div>
      </div>
      <div class="row">
        <div><label>NIK *</label><input type="text" id="nik" name="nik" required></div>
        <div><label>ID Kampus *</label><input type="text" id="idKampus" name="idKampus" required></div>
      </div>
      <label>Email *</label><input type="email" id="email" name="email" required>

      <!-- Field Khusus Mahasiswa -->
      <div id="fieldMhs" class="hidden">
        <div class="row">
          <div><label>NIM</label><input type="text" id="nim" name="nim"></div>
          <div><label>Jurusan</label><input type="text" id="jurusan" name="jurusan"></div>
        </div>
        <label>IPK</label><input type="text" id="ipk" name="ipk" placeholder="Contoh: 3.75">
      </div>

      <!-- Field Khusus Dosen -->
      <div id="fieldDosen" class="hidden">
        <div class="row">
          <div><label>NIDN</label><input type="text" id="nidn" name="nidn"></div>
          <div><label>Jabatan</label><input type="text" id="jabatan" name="jabatan" placeholder="Lektor, Guru Besar"></div>
        </div>
        <label>Mata Kuliah (pisah koma)</label><input type="text" id="matkul" name="matkul" placeholder="Web, Basis Data">
      </div>

      <!-- Field Khusus Staff -->
      <div id="fieldStaff" class="hidden">
        <div class="row">
          <div><label>Bagian</label><input type="text" id="bagian" name="bagian"></div>
          <div><label>Golongan</label><input type="text" id="golongan" name="golongan"></div>
        </div>
      </div>

      <button type="submit" class="btn">Simpan Data</button>
    </form>
  </div>

  <div class="card">
    <h3>Data Tersimpan</h3>
    <table id="tabelData">
      <thead><tr><th>Tipe</th><th>Nama</th><th>ID</th><th>Detail</th><th>Aksi</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
// ===== 1. CLASS INHERITANCE =====
class Manusia {
  constructor(nama, umur, nik) { this.nama=nama; this.umur=umur; this.nik=nik; }
}

class CivitasAkademika extends Manusia {
  constructor(nama, umur, nik, idKampus, email) {
    super(nama, umur, nik);
    this.idKampus=idKampus; this.email=email; this.tipe="Civitas";
  }
}

class Mahasiswa extends CivitasAkademika {
  constructor(data) {
    super(data.nama, data.umur, data.nik, data.idKampus, data.email);
    this.tipe="Mahasiswa"; this.nim=data.nim; this.jurusan=data.jurusan; this.ipk=parseFloat(data.ipk) || 0;
  }
  cekPredikat() {
    if(this.ipk >= 3.5) return "Cumlaude";
    else if(this.ipk >= 3.0) return "Sangat Memuaskan";
    else if(this.ipk >= 2.5) return "Memuaskan";
    else return "Perlu Perbaikan";
  }
  getDetail() { return `NIM:${this.nim} | Jur:${this.jurusan} | IPK:${this.ipk} - ${this.cekPredikat()}`; }
}

class Dosen extends CivitasAkademika {
  constructor(data) {
    super(data.nama, data.umur, data.nik, data.idKampus, data.email);
    this.tipe="Dosen"; this.nidn=data.nidn; this.jabatan=data.jabatan; this.matkul=(data.matkul || "").split(',');
  }
  getDetail() { return `NIDN:${this.nidn} | ${this.jabatan} | MK:${this.matkul.join(', ')}`; }
}

class Staff extends CivitasAkademika {
  constructor(data) {
    super(data.nama, data.umur, data.nik, data.idKampus, data.email);
    this.tipe="Staff"; this.bagian=data.bagian; this.golongan=data.golongan;
  }
  getDetail() { return `Bagian:${this.bagian} | Gol:${this.golongan}`; }
}

// ===== 2. LOGIC FORM =====
const tipe = document.getElementById('tipe');
const fieldMhs = document.getElementById('fieldMhs');
const fieldDosen = document.getElementById('fieldDosen');
const fieldStaff = document.getElementById('fieldStaff');

tipe.addEventListener('change', () => {
  fieldMhs.classList.add('hidden');
  fieldDosen.classList.add('hidden');
  fieldStaff.classList.add('hidden');
  if(tipe.value == "Mahasiswa") fieldMhs.classList.remove('hidden');
  if(tipe.value == "Dosen") fieldDosen.classList.remove('hidden');
  if(tipe.value == "Staff") fieldStaff.classList.remove('hidden');
});

let dataMentah = JSON.parse(localStorage.getItem('civitas')) || [];
let dataCivitas = [];

function loadData(){
  dataCivitas = dataMentah.map(item => {
    if(item.tipe == "Mahasiswa") return new Mahasiswa(item);
    if(item.tipe == "Dosen") return new Dosen(item);
    if(item.tipe == "Staff") return new Staff(item);
  }).filter(Boolean);
}

function simpanKeStorage(){
  localStorage.setItem('civitas', JSON.stringify(dataMentah));
}

function tampilkanData(){
  const tbody = document.querySelector('#tabelData tbody');
  tbody.innerHTML = "";
  dataCivitas.forEach((obj, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${obj.tipe}</td>
        <td>${obj.nama}</td>
        <td>${obj.idKampus}</td>
        <td>${obj.getDetail()}</td>
        <td><button class="btn-danger" onclick="hapus(${i})">Hapus</button></td>
      </tr>
    `;
  });
}

document.getElementById('formCivitas').addEventListener('submit', function(e){
  e.preventDefault();
  const formData = Object.fromEntries(new FormData(this).entries());
  formData.email = formData.email.trim(); // hapus spasi
  formData.ipk = formData.ipk.replace(',', '.'); // ganti koma ke titik
  
  let objBaru;
  if(formData.tipe == "Mahasiswa") objBaru = new Mahasiswa(formData);
  else if(formData.tipe == "Dosen") objBaru = new Dosen(formData);
  else if(formData.tipe == "Staff") objBaru = new Staff(formData);

  dataCivitas.push(objBaru);
  dataMentah.push(formData);
  simpanKeStorage();
  tampilkanData();
  this.reset();
  tipe.dispatchEvent(new Event('change'));
  alert("Data berhasil disimpan!");
});

function hapus(index){
  if(confirm("Yakin mau hapus data ini?")){
    dataCivitas.splice(index,1);
    dataMentah.splice(index,1);
    simpanKeStorage();
    tampilkanData();
  }
}

loadData(); 
tampilkanData(); 
</script>
</body>
</html>
