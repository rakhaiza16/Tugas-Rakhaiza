<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Input Data Mahasiswa</title>
<style>
  :root{
    --primary: #4F46E5;
    --primary-dark: #4338CA;
    --bg: #F8FAFC;
    --card: #FFFFFF;
    --text: #1E293B;
    --muted: #64748B;
    --success: #10B981;
    --error: #EF4444;
  }
  *{box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Roboto, sans-serif;}
  body{
    background: linear-gradient(135deg, #EEF2FF 0%, #E0E7FF 100%);
    color: var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
  }
  .card{
    background: var(--card);
    width:100%;
    max-width:480px;
    padding:32px;
    border-radius:20px;
    box-shadow: 0 10px 30px rgba(79, 70, 229, 0.1);
    animation: fadeIn .4s ease;
  }
  @keyframes fadeIn{
    from{opacity:0; transform: translateY(10px);}
    to{opacity:1; transform: translateY(0);}
  }
  .header{
    text-align:center;
    margin-bottom:24px;
  }
  .header h1{
    font-size:24px;
    color: var(--primary);
    margin-bottom:6px;
  }
  .header p{
    color: var(--muted);
    font-size:14px;
  }
  .form-group{
    margin-bottom:18px;
  }
  label{
    display:block;
    font-weight:600;
    margin-bottom:8px;
    font-size:14px;
  }
  input, select{
    width:100%;
    padding:12px 14px;
    border:2px solid #E2E8F0;
    border-radius:12px;
    font-size:15px;
    transition: all .2s;
    background:#fff;
  }
  input:focus, select:focus{
    border-color: var(--primary);
    outline:none;
    box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
  }
  .btn{
    width:100%;
    padding:14px;
    background: var(--primary);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition: all .2s;
    margin-top:8px;
  }
  .btn:hover{
    background: var(--primary-dark);
    transform: translateY(-2px);
  }
  .alert{
    padding:12px;
    border-radius:10px;
    margin-bottom:16px;
    font-size:14px;
    display:none;
  }
  .alert.success{
    background:#D1FAE5;
    color: var(--success);
    border:1px solid #A7F3D0;
  }
  .alert.error{
    background:#FEE2E2;
    color: var(--error);
    border:1px solid #FECACA;
  }
  .row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media(max-width:500px){
    .row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>📝 Input Data Mahasiswa</h1>
    <p>Lengkapi data di bawah ini</p>
  </div>

  <div id="alert" class="alert"></div>

  <form id="formMahasiswa">
    <div class="form-group">
      <label for="nim">NIM *</label>
      <input type="text" id="nim" name="nim" placeholder="Contoh: 202310101" required pattern="[0-9]{8,12}">
    </div>

    <div class="form-group">
      <label for="nama">Nama Lengkap *</label>
      <input type="text" id="nama" name="nama" placeholder="Masukkan nama mahasiswa" required>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="jurusan">Jurusan *</label>
        <select id="jurusan" name="jurusan" required>
          <option value="">-- Pilih Jurusan --</option>
          <option value="Informatika">Teknik Informatika</option>
          <option value="Sistem Informasi">Sistem Informasi</option>
          <option value="Manajemen">Manajemen</option>
          <option value="Akuntansi">Akuntansi</option>
          <option value="Hukum">Ilmu Hukum</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fakultas">Fakultas *</label>
        <select id="fakultas" name="fakultas" required>
          <option value="">-- Pilih Fakultas --</option>
          <option value="Fakultas Teknik">Fakultas Teknik</option>
          <option value="Fakultas Ekonomi">Fakultas Ekonomi</option>
          <option value="Fakultas Hukum">Fakultas Hukum</option>
          <option value="Fakultas Ilmu Komputer">Fakultas Ilmu Komputer</option>
        </select>
      </div>
    </div>

    <button type="submit" class="btn">Simpan Data</button>
  </form>
</div>

<script>
  const form = document.getElementById('formMahasiswa');
  const alertBox = document.getElementById('alert');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    
    const data = {
      nim: form.nim.value,
      nama: form.nama.value,
      jurusan: form.jurusan.value,
      fakultas: form.fakultas.value
    };

    // Validasi NIM angka
    if(!/^[0-9]{8,12}$/.test(data.nim)){
      showAlert('NIM harus berupa angka 8-12 digit', 'error');
      return;
    }

    console.log('Data Mahasiswa:', data);
    showAlert(`Data ${data.nama} berhasil disimpan!`, 'success');
    form.reset();
  });

  function showAlert(message, type){
    alertBox.textContent = message;
    alertBox.className = `alert ${type}`;
    alertBox.style.display = 'block';
    setTimeout(()=> alertBox.style.display = 'none', 3000);
  }
</script>

</body>
</html>
